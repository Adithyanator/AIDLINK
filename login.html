<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ReliefNet</title>
  <meta name="description" content="Ward member login for the ReliefNet disaster rescue platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>

<body>

  <div class="auth-card" style="position:relative;">

    <a href="/" style="position:absolute;top:16px;right:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#f3f4f6;color:#6b7280;text-decoration:none;font-size:1.1rem;line-height:1;transition:background .15s,color .15s;" onmouseover="this.style.background='#e5e7eb';this.style.color='#1f2937'" onmouseout="this.style.background='#f3f4f6';this.style.color='#6b7280'" title="Back to Home">✕</a>

    <div class="auth-logo">
      <span class="auth-logo-name">ReliefNet</span>
      <span class="auth-logo-sub">Disaster Rescue Management</span>
    </div>

    <!-- STEP 1: Phone number -->
    <div class="step active" id="step1">
      <h1 class="auth-title">Admin Login</h1>
      <p class="auth-sub">Enter your registered phone number to receive an OTP.</p>

      <div class="alert alert-error" id="errBox1"></div>

      <form id="phoneForm" novalidate>
        <div class="form-group">
          <label for="phone">Phone Number (10 digits)</label>
          <input type="tel" id="phone" class="form-control" placeholder="9XXXXXXXXX" maxlength="10" autofocus
            required />
        </div>
        <button type="submit" class="btn btn-primary" id="sendOtpBtn">Send OTP</button>
      </form>

      <p class="auth-footer">Not registered? <a href="/register.html">Register here</a></p>
    </div>

    <!-- STEP 2: OTP verify -->
    <div class="step" id="step2">
      <h1 class="auth-title">Enter OTP</h1>
      <p class="auth-sub" id="step2Sub">OTP sent to your phone.</p>

      <!-- OTP display box (demo mode) -->
      <div class="otp-box" id="otpBox">
        <div class="otp-box-label">Your OTP (demo — would be sent via SMS)</div>
        <div class="otp-code" id="otpDisplay"></div>
        <div class="otp-hint">Valid for 5 minutes</div>
      </div>

      <div class="alert alert-error" id="errBox2"></div>

      <form id="otpForm" novalidate>
        <div class="form-group">
          <label for="otp">6-digit OTP</label>
          <input type="text" id="otp" class="form-control" placeholder="Enter OTP" maxlength="6" inputmode="numeric"
            autofocus required />
        </div>
        <button type="submit" class="btn btn-primary" id="verifyBtn">Verify & Login</button>
      </form>

      <div class="divider"></div>
      <p class="auth-footer"><a href="#" id="backBtn">Use a different number</a></p>
    </div>

  </div>

  <script>
    let currentPhone = '';

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const errBox1 = document.getElementById('errBox1');
    const errBox2 = document.getElementById('errBox2');
    const otpBox = document.getElementById('otpBox');
    const otpDisplay = document.getElementById('otpDisplay');
    const step2Sub = document.getElementById('step2Sub');
    const sendOtpBtn = document.getElementById('sendOtpBtn');
    const verifyBtn = document.getElementById('verifyBtn');

    // If already logged in, go straight to dashboard
    (async () => {
      try {
        const res = await fetch('/api/me');
        if (res.ok) { const d = await res.json(); if (d.ok) window.location.href = '/dashboard.html'; }
      } catch { }
    })();

    function showStep(n) {
      step1.classList.toggle('active', n === 1);
      step2.classList.toggle('active', n === 2);
    }

    // ---- Step 1: Send OTP ----
    document.getElementById('phoneForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox1.classList.remove('show');

      const phone = document.getElementById('phone').value.trim();
      if (!/^\d{10}$/.test(phone)) {
        errBox1.textContent = 'Enter a valid 10-digit phone number.';
        errBox1.classList.add('show');
        return;
      }

      sendOtpBtn.disabled = true;
      sendOtpBtn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone }),
        });
        const data = await res.json();

        if (!data.ok) {
          errBox1.textContent = data.error || 'Failed to send OTP.';
          errBox1.classList.add('show');
          sendOtpBtn.disabled = false;
          sendOtpBtn.textContent = 'Send OTP';
          return;
        }

        currentPhone = phone;
        step2Sub.textContent = `OTP for ${data.name} (${phone})`;
        otpDisplay.textContent = data.otp;
        otpBox.classList.add('show');
        showStep(2);

      } catch {
        errBox1.textContent = 'Server error. Make sure the server is running.';
        errBox1.classList.add('show');
        sendOtpBtn.disabled = false;
        sendOtpBtn.textContent = 'Send OTP';
      }
    });

    // ---- Step 2: Verify OTP ----
    document.getElementById('otpForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox2.classList.remove('show');

      const otp = document.getElementById('otp').value.trim();
      if (!otp) {
        errBox2.textContent = 'Please enter the OTP.';
        errBox2.classList.add('show');
        return;
      }

      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying...';

      try {
        const res = await fetch('/api/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: currentPhone, otp }),
        });
        const data = await res.json();

        if (!data.ok) {
          errBox2.textContent = data.error || 'Invalid OTP.';
          errBox2.classList.add('show');
          verifyBtn.disabled = false;
          verifyBtn.textContent = 'Verify & Login';
          return;
        }

        window.location.href = '/dashboard.html';

      } catch {
        errBox2.textContent = 'Server error. Please try again.';
        errBox2.classList.add('show');
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify & Login';
      }
    });

    // Back button
    document.getElementById('backBtn').addEventListener('click', (e) => {
      e.preventDefault();
      errBox1.classList.remove('show');
      sendOtpBtn.disabled = false;
      sendOtpBtn.textContent = 'Send OTP';
      showStep(1);
    });
  </script>

</body>

</html>
