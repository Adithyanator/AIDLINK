<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIDLink — Public Portal</title>
  <meta name="description" content="Find nearby disaster relief camps and donate resources." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

  <style>
    :root {
      --green: #4c9964;
      --green-hover: #3a804f;
      --white: #ffffff;
      --bg: #f9fafb;
      --border: #e5e7eb;
      --text: #1f2937;
      --text-2: #4b5563;
      --text-3: #9ca3af;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding-bottom: 60px;
    }

    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--green);
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: .5rem;
      text-align: center;
    }

    p.subtitle {
      color: var(--text-2);
      text-align: center;
      margin-bottom: 2rem;
    }

    .map-wrapper {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 2rem;
    }

    #map {
      width: 100%;
      height: 450px;
      background: #eaebec;
    }

    .status-panel {
      padding: 1.5rem;
      text-align: center;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 99px;
      cursor: pointer;
      text-decoration: none;
      transition: .15s;
      border: none;
    }

    .btn-primary {
      background: var(--green);
      color: var(--white);
      width: 100%;
      max-width: 300px;
    }

    .btn-primary:hover {
      background: var(--green-hover);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    .btn-outline:hover {
      background: var(--white);
      border-color: #bbb;
    }

    .actions-grid {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
      position: relative;
      z-index: 1000;
    }

    /* ======= DONATE MODAL ======= */
    .donate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    .donate-overlay.open {
      display: flex;
    }

    .donate-modal {
      background: var(--white);
      border-radius: var(--radius);
      width: 95%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      animation: slideUp .25s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .donate-modal h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: .25rem;
    }

    .donate-modal .subtitle {
      font-size: .85rem;
      color: var(--text-3);
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 10px 14px;
      font-size: .9rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--green);
    }

    .form-textarea {
      resize: vertical;
      min-height: 70px;
    }

    .toggle-group {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: .85rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: var(--bg);
      color: var(--text-2);
      transition: .15s;
    }

    .toggle-btn.active {
      background: var(--green);
      color: #fff;
    }

    .form-actions {
      display: flex;
      gap: .75rem;
      margin-top: 1.5rem;
    }

    .form-actions .btn {
      flex: 1;
      padding: 11px;
      font-size: .9rem;
      border-radius: 8px;
    }

    .btn-cancel {
      background: var(--bg);
      color: var(--text-2);
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
    }

    .btn-cancel:hover {
      background: #eee;
    }

    .btn-submit {
      background: var(--green);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }

    .btn-submit:hover {
      background: var(--green-hover);
    }

    .toast-public {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: .875rem;
      z-index: 99999;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    .toast-public.show {
      opacity: 1;
    }

    /* ======= MAP MARKERS (inline for public page) ======= */
    .custom-map-marker {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .marker-user {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: #4285F4;
      border: 2.5px solid #fff;
      box-shadow: 0 0 8px rgba(66, 133, 244, 0.5);
    }

    .camp-marker-serious {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 32px;
    }

    .marker-icon {
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.4));
    }

    .marker-pulse {
      position: absolute;
      top: 50%;
      left: 50%;
      margin-top: -14px;
      margin-left: -14px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      z-index: 1;
      animation: radar-pulse 2.2s infinite ease-out;
    }

    @keyframes radar-pulse {
      0% {
        transform: scale(0.8);
        opacity: 0.8;
      }

      100% {
        transform: scale(2.4);
        opacity: 0;
      }
    }

    .map-legend {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(6px);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .78rem;
      line-height: 1.7;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .legend-title {
      font-weight: 700;
      font-size: .8rem;
      margin-bottom: 4px;
      color: #1f2937;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #374151;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid #fff;
      box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">AIDLink</div>
    <div>
      <a href="/login.html" class="btn btn-outline" style="padding: 8px 16px; font-size: .85rem;">Ward Member Login</a>
    </div>
  </header>

  <main>
    <h1>Nearby Relief Camps</h1>
    <p class="subtitle">Allow location access to find operational disaster rescue hubs near you.</p>

    <div class="map-wrapper">
      <div id="statusPanel" class="status-panel">
        <div class="spinner" id="spinner"></div>
        <p id="statusText">Requesting geographic location...</p>
      </div>

      <div id="map" style="display: none;"></div>
    </div>

    <div class="actions-grid">
      <button class="btn btn-primary" onclick="openDonateModal()">Donate Resources</button>
      <button class="btn btn-primary" style="background-color:var(--green); color: var(--white);border: var(--green);"
        onclick="openVolunteerModal()">Become a Volunteer</button>
    </div>
  </main>

  <!-- Donate Modal -->
  <div class="donate-overlay" id="donateOverlay" onclick="if(event.target===this)closeDonateModal()">
    <div class="donate-modal">
      <h2>Donate Resources</h2>
      <p class="subtitle">Help communities in need by contributing supplies.</p>
      <form id="donateForm" onsubmit="submitDonation(event)">
        <div class="form-group">
          <label class="form-label">Donor Type</label>
          <div class="toggle-group">
            <button type="button" class="toggle-btn active" onclick="setDonorType('personal',this)">Personal</button>
            <button type="button" class="toggle-btn" onclick="setDonorType('organisation',this)">Organisation</button>
          </div>
        </div>
        <input type="hidden" id="donorType" value="personal">
        <div class="form-group">
          <label class="form-label" id="nameLabel">Your Name</label>
          <input class="form-input" id="donorName" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input class="form-input" id="donorPhone" type="tel" placeholder="+91 98000 00000" required>
        </div>
        <div class="form-group">
          <label class="form-label">Resource Type</label>
          <select class="form-select" id="donorResource" required>
            <option value="" disabled selected>Select resource</option>
            <option>Food</option>
            <option>Water</option>
            <option>Medicine</option>
            <option>Clothes</option>
            <option>Blankets</option>
            <option>Shelter Materials</option>
            <option>Funds</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity / Description</label>
          <input class="form-input" id="donorQty" placeholder="e.g. 200 food packets" required>
        </div>
        <div class="form-group">
          <label class="form-label">Select Camp</label>
          <select class="form-select" id="donorCamp" required>
            <option value="" disabled selected>Choose a camp</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Additional Notes (optional)</label>
          <textarea class="form-textarea" id="donorNotes" placeholder="Any other details..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" onclick="closeDonateModal()">Cancel</button>
          <button type="submit" class="btn btn-submit">Submit Donation</button>
        </div>
    </div>
    </form>
  </div>
  </div>

  <!-- ======= VOLUNTEER MODAL ======= -->
  <div class="donate-overlay" id="volunteerModal">
    <div class="donate-modal" style="max-width: 420px;">
      <h2>Join as a Volunteer</h2>
      <p class="subtitle">Help the community in a time of need.</p>

      <!-- STEP 1: Details -->
      <div id="volStep1">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-input" id="volName" placeholder="Enter your full name">
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <div style="display:flex; gap:8px;">
            <input class="form-input" id="volPhone" type="tel" placeholder="+91 98000 00000">
            <button type="button" class="btn-submit" style="padding: 0 16px; border-radius: 8px;"
              onclick="requestVolOtp()">Get OTP</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Location / Area</label>
          <input class="form-input" id="volLocation" placeholder="e.g. Anna Nagar, Chennai">
        </div>
        <div class="form-group">
          <label class="form-label">How can you help?</label>
          <select class="form-select" id="volHelp">
            <option value="" disabled selected>Select an option</option>
            <option>Deliver food</option>
            <option>Help evacuation</option>
            <option>Provide vehicle</option>
            <option>Medical help</option>
            <option>Verify ground situation</option>
            <option>General support</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" onclick="closeVolunteerModal()">Cancel</button>
        </div>
      </div>

      <!-- STEP 2: OTP Verification -->
      <div id="volStep2" style="display: none;">
        <div class="form-group">
          <label class="form-label" style="color:var(--amber);">Enter OTP sent to <span
              id="volOTPTarget"></span></label>
          <input class="form-input" id="volOtpInput" type="number" placeholder="6-digit code">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" onclick="backToVolStep1()">Back</button>
          <button type="button" class="btn btn-submit" onclick="submitVolunteer()">Verify & Join</button>
        </div>
      </div>

    </div>
  </div>

  <div class="toast-public" id="toastPublic"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="data.js"></script>
  <script src="public.js"></script>

</body>

</html>
