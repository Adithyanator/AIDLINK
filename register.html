<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ReliefNet</title>
  <meta name="description" content="Ward member registration for the ReliefNet disaster rescue platform."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

<div class="auth-card">

  <div class="auth-logo">
    <span class="auth-logo-name">ReliefNet</span>
    <span class="auth-logo-sub">Disaster Rescue Management</span>
  </div>

  <h1 class="auth-title">Ward Member Registration</h1>
  <p class="auth-sub">Register once. Login during any disaster to coordinate relief.</p>

  <div class="alert alert-error" id="errBox"></div>
  <div class="alert alert-success" id="successBox"></div>

  <form id="registerForm" novalidate>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="e.g. Rajan Iyer" required/>
    </div>

    <div class="form-group">
      <label for="phone">Phone Number (10 digits)</label>
      <input type="tel" id="phone" class="form-control" placeholder="9XXXXXXXXX" maxlength="10" required/>
    </div>

    <div class="form-group">
      <label for="district">District</label>
      <input type="text" id="district" class="form-control" placeholder="e.g. Chennai" required/>
    </div>

    <div class="form-group">
      <label for="ward_number">Ward Number</label>
      <input type="text" id="ward_number" class="form-control" placeholder="e.g. 42" required/>
    </div>

    <div class="form-group">
      <label for="ward_name">Ward Name</label>
      <input type="text" id="ward_name" class="form-control" placeholder="e.g. Anna Nagar East" required/>
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn">Register</button>
  </form>

  <p class="auth-footer">Already registered? <a href="/login.html">Login here</a></p>
</div>

<script>
  const form      = document.getElementById('registerForm');
  const errBox    = document.getElementById('errBox');
  const successBox= document.getElementById('successBox');
  const submitBtn = document.getElementById('submitBtn');

  function showErr(msg) {
    errBox.textContent = msg;
    errBox.classList.add('show');
    successBox.classList.remove('show');
  }

  function showSuccess(msg) {
    successBox.textContent = msg;
    successBox.classList.add('show');
    errBox.classList.remove('show');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errBox.classList.remove('show');
    successBox.classList.remove('show');

    const body = {
      name:        document.getElementById('name').value.trim(),
      phone:       document.getElementById('phone').value.trim(),
      district:    document.getElementById('district').value.trim(),
      ward_number: document.getElementById('ward_number').value.trim(),
      ward_name:   document.getElementById('ward_name').value.trim(),
    };

    if (!body.name || !body.phone || !body.district || !body.ward_number || !body.ward_name) {
      return showErr('All fields are required.');
    }
    if (!/^\d{10}$/.test(body.phone)) {
      return showErr('Phone must be exactly 10 digits.');
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Registering...';

    try {
      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();

      if (!data.ok) {
        showErr(data.error || 'Registration failed.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Register';
        return;
      }

      showSuccess('Registered successfully! Redirecting to login...');
      setTimeout(() => { window.location.href = '/login.html'; }, 1500);

    } catch (err) {
      showErr('Server error. Make sure the server is running.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Register';
    }
  });
</script>

</body>
</html>
